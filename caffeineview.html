<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caffeineview · 서울 카페 뷰 파인더</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg-top:#eaf3fb;
    --bg-bottom:#fff8ef;
    --ink:#2b2320;
    --muted:#78716a;
    --accent:#b9773f;
    --accent-dark:#8a5a2e;
    --card-bg:#ffffff;
    --chip-bg:#f3ede4;
    --chip-ink:#6b5f52;
    --line:#eee2d3;
    --shadow:0 10px 28px rgba(80,55,25,0.09);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 55%);
    min-height:100vh;
  }
  .wrap{ max-width:1080px; margin:0 auto; padding:40px 24px 64px; }

  header.hero{ text-align:center; padding:12px 0 28px; }
  .hero-icons{ font-size:34px; letter-spacing:14px; margin-bottom:6px; }
  .hero h1{
    font-size:clamp(28px, 4vw, 40px);
    margin:0 0 8px;
    font-weight:800;
    letter-spacing:-0.02em;
  }
  .hero h1 span{ color:var(--accent); }
  .hero p{ margin:0; color:var(--muted); font-size:15px; }

  .panel{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:28px;
  }
  .search-row{ display:flex; gap:10px; margin-bottom:16px; }
  .search-row input{
    flex:1;
    border:1px solid var(--line);
    background:#fbf7ef;
    border-radius:12px;
    padding:12px 16px;
    font-size:14px;
    font-family:inherit;
    color:var(--ink);
    outline:none;
    transition:border-color .15s;
  }
  .search-row input:focus{ border-color:var(--accent); }
  .filter-label{
    font-size:12px; font-weight:700; color:var(--muted);
    margin:14px 0 8px; text-transform:uppercase; letter-spacing:.04em;
  }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    border:1px solid var(--line);
    background:var(--chip-bg);
    color:var(--chip-ink);
    padding:7px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    user-select:none;
    transition:.15s;
    white-space:nowrap;
  }
  .chip:hover{ border-color:var(--accent); }
  .chip.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }

  .result-count{ font-size:13px; color:var(--muted); margin:4px 2px 14px; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
    gap:18px;
  }
  .card{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card:hover{ transform:translateY(-4px); box-shadow:0 16px 34px rgba(80,55,25,0.14); }
  .card-top{ display:flex; align-items:center; gap:10px; }
  .card-emoji{
    font-size:26px;
    width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg-top);
    border-radius:12px;
    flex:none;
  }
  .card-title{ font-size:16px; font-weight:800; line-height:1.3; }
  .card-area{ font-size:12px; color:var(--muted); font-weight:600; }
  .card-desc{ font-size:13.5px; color:#4a433d; line-height:1.55; flex:1; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .tag{
    font-size:11.5px;
    background:var(--chip-bg);
    color:var(--chip-ink);
    padding:4px 10px;
    border-radius:999px;
    font-weight:600;
  }
  .card-tip{
    font-size:12px;
    color:var(--accent-dark);
    background:#fbf1e4;
    border-radius:10px;
    padding:8px 10px;
    font-weight:600;
  }

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-size:14px;
  }

  .overlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(30,20,10,0.45);
    align-items:center; justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:#fff;
    border-radius:22px;
    max-width:480px;
    width:100%;
    padding:28px;
    box-shadow:0 24px 60px rgba(0,0,0,0.25);
    position:relative;
  }
  .modal-close{
    position:absolute; top:16px; right:18px;
    border:none; background:none; font-size:20px;
    cursor:pointer; color:var(--muted);
  }
  .modal-emoji{ font-size:38px; margin-bottom:10px; }
  .modal h2{ margin:0 0 4px; font-size:22px; font-weight:800; }
  .modal .card-area{ margin-bottom:14px; display:block; }
  .modal-section{ margin-top:16px; }
  .modal-section h3{
    font-size:12px; text-transform:uppercase; letter-spacing:.04em;
    color:var(--muted); margin:0 0 6px; font-weight:700;
  }
  .modal-section p{ margin:0; font-size:14px; line-height:1.6; color:#3d372f; }

  footer{
    text-align:center;
    color:var(--muted);
    font-size:12px;
    margin-top:40px;
    line-height:1.6;
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <div class="hero-icons">☕ 🍰 📸</div>
    <h1><span>Caffeineview</span> · 서울 카페 뷰 파인더</h1>
    <p>사진 찍기 좋은 뷰, 오늘은 어디서 커피 한 잔 할까요?</p>
  </header>

  <div class="panel">
    <div class="search-row">
      <input id="search" type="text" placeholder="카페, 동네, '노을', '야경' 같은 키워드로 검색해보세요" />
    </div>

    <div class="filter-label">지역</div>
    <div class="chips" id="areaChips"></div>

    <div class="filter-label">뷰 타입</div>
    <div class="chips" id="typeChips"></div>
  </div>

  <div class="result-count" id="resultCount"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none;">😶 조건에 맞는 카페가 없어요. 필터를 바꿔보세요.</div>

  <footer>
    소개된 장소는 서울에서 널리 알려진 '뷰 맛집' 동네·명소를 바탕으로 소개하는 참고 정보이며,<br/>
    실제 방문 전에는 영업시간과 최신 정보를 다시 확인해주세요. ☕
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const CAFES = [

    tip: "해질 무렵 창가 자리에서 노을과 골목 풍경이 함께 담겨요.",

  },

  {

    type: "도심·야경뷰", emoji: "🌃",
    tags: ["서울 성곽", "야경", "도심 전망"],
    desc: "낙산공원 성곽을 따라 늘어선 카페들에서 종로·동대문 일대 도심 야경을 내려다볼 수 있어요.",

  },
  {
    name: "서울숲 리버뷰 카페", area: "성수동", areaGroup: "성수동",
    type: "강·숲뷰", emoji: "🌉",
    tags: ["통유리창", "숲과 강"],
    desc: "서울숲의 초록과 한강이 함께 시야에 들어오는 통유리 통창 좌석이 특징인 카페.",
    tip: "창가 2층 자리가 숲과 강을 동시에 담기 좋아요.",

  },
  {
    name: "뚝섬 한강공원 인근 카페", area: "성수동·뚝섬", areaGroup: "성수동",
    type: "한강뷰", emoji: "🌇",
    tags: ["노을 명소", "루프탑"],
    desc: "뚝섬 한강공원 자벌레 전망대 인근, 노을 시간대 인생샷 명소로 꼽히는 한강뷰 카페들이 모여 있어요.",
    tip: "노을이 물드는 시간, 한강과 다리 실루엣을 배경으로 담아보세요.",
    bestTime: "일몰 시간"
  },
  {
    name: "이촌 한강 카페거리", area: "이촌동", areaGroup: "한강변",
    type: "한강뷰", emoji: "🌊",
    tags: ["반포대교 조망", "야경"],
    desc: "반포대교 무지개 분수와 한강 야경을 감상할 수 있는 강변 산책로변 카페들.",
    tip: "분수쇼 시간에 맞춰 방문하면 창밖 풍경이 더 화려해요.",
    bestTime: "저녁 분수쇼 시간"
  },
  {
    name: "여의도 한강공원 카페", area: "여의도", areaGroup: "한강변",
    type: "한강뷰", emoji: "🏙️",
    tags: ["63빌딩", "노을", "탁 트인 시야"],
    desc: "63빌딩과 마포대교를 배경으로 한강이 넓게 펼쳐지는, 탁 트인 뷰가 매력적인 구간.",
    tip: "노을과 63빌딩이 함께 보이는 서쪽 창가 자리를 추천해요.",
    bestTime: "일몰 무렵"
  },
  {
    name: "한남동 옥상 카페", area: "한남동", areaGroup: "한남동·이태원",
    type: "루프탑", emoji: "🧗",
    tags: ["남산타워 조망", "옥상 정원"],
    desc: "골목 안 건물 옥상에 자리해 남산타워와 도심 스카이라인을 함께 즐길 수 있는 루프탑 카페.",
    tip: "저녁에는 남산타워 조명이 켜져 야경 사진이 더 예뻐요.",
    bestTime: "해질녘~초저녁"
  },
  {
    name: "경리단길 루프탑", area: "이태원·경리단길", areaGroup: "한남동·이태원",
    type: "루프탑", emoji: "🍹",
    tags: ["골목뷰", "이국적 분위기"],
    desc: "언덕진 골목 위 루프탑에서 이태원 특유의 이국적인 거리 풍경을 내려다볼 수 있어요.",
    tip: "낮에는 파스텔톤 골목, 밤에는 알록달록한 간판 불빛이 포인트.",
    bestTime: "낮 또는 초저녁"
  },
  {
    name: "남산 소월길 카페", area: "회현동·소월길", areaGroup: "낙산·대학로",
    type: "도심·야경뷰", emoji: "🗼",
    tags: ["서울 전경", "야경"],
    desc: "남산으로 오르는 소월길 언덕에서 서울 도심 전경을 시원하게 내려다볼 수 있는 카페들.",
    tip: "차가 많은 낮보다 조명이 켜지는 밤 풍경이 훨씬 인상적이에요.",
    bestTime: "야간"
  },
  {
    name: "연남동 경의선숲길 카페", area: "연남동", areaGroup: "연남동",
    type: "산·숲뷰", emoji: "🌿",
    tags: ["숲길뷰", "감성 산책로"],
    desc: "기다란 경의선숲길을 따라 초록빛 산책로가 통창 너머로 펼쳐지는 감성 카페 거리.",
    tip: "숲길과 나란히 난 창가 자리가 사진 담기 가장 좋아요.",
    bestTime: "오전~낮"
  },
  {
    name: "서촌 옥상카페", area: "서촌·통인동", areaGroup: "북촌·서촌",
    type: "도심·전통뷰", emoji: "🏯",
    tags: ["기와지붕", "인왕산", "전통 골목"],
    desc: "낮은 한옥 지붕들과 인왕산이 어우러진 옛 정취를 옥상에서 내려다볼 수 있는 카페.",
    tip: "기와지붕 라인을 따라 인왕산이 함께 담기는 구도를 추천해요.",
    bestTime: "오후"
  },
  {
    name: "북한산 자락 카페", area: "평창동·구기동", areaGroup: "부암동·평창동",
    type: "산·숲뷰", emoji: "⛰️",
    tags: ["북한산 조망", "탁 트인 정원"],
    desc: "북한산 능선을 정면으로 마주하는 넓은 정원형 카페들이 모여 있는 조용한 동네.",
    tip: "맑은 날 오전, 능선이 가장 선명하게 보여요.",
    bestTime: "맑은 날 오전"
  }
];

const AREA_GROUPS = ["전체", ...Array.from(new Set(CAFES.map(c => c.areaGroup)))];
const TYPES = ["전체", ...Array.from(new Set(CAFES.map(c => c.type)))];

let state = { area: "전체", type: "전체", q: "" };

function renderChips(containerId, items, key){
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  items.forEach(val => {
    const chip = document.createElement("div");
    chip.className = "chip" + (state[key] === val ? " active" : "");
    chip.textContent = val;
    chip.onclick = () => { state[key] = val; renderChips(containerId, items, key); renderGrid(); };
    el.appendChild(chip);
  });
}

function matches(cafe){
  const areaOk = state.area === "전체" || cafe.areaGroup === state.area;
  const typeOk = state.type === "전체" || cafe.type === state.type;
  const q = state.q.trim().toLowerCase();
  const qOk = !q || [cafe.name, cafe.area, cafe.type, cafe.desc, cafe.tip, ...cafe.tags]
    .join(" ").toLowerCase().includes(q);
  return areaOk && typeOk && qOk;
}

function renderGrid(){
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyState");
  const list = CAFES.filter(matches);
  document.getElementById("resultCount").textContent = `${list.length}곳의 카페를 찾았어요`;
  grid.innerHTML = "";
  empty.style.display = list.length ? "none" : "block";

  list.forEach(cafe => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-top">
        <div class="card-emoji">${cafe.emoji}</div>
        <div>
          <div class="card-title">${cafe.name}</div>
          <div class="card-area">${cafe.area} · ${cafe.type}</div>
        </div>
      </div>
      <div class="card-desc">${cafe.desc}</div>
      <div class="tag-row">${cafe.tags.map(t => `<span class="tag">#${t}</span>`).join("")}</div>
      <div class="card-tip">📸 ${cafe.tip}</div>
    `;
    card.onclick = () => openModal(cafe);
    grid.appendChild(card);
  });
}

function openModal(cafe){
  const modal = document.getElementById("modal");
  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-emoji">${cafe.emoji}</div>
    <h2>${cafe.name}</h2>
    <span class="card-area">${cafe.area} · ${cafe.type}</span>
    <div class="tag-row">${cafe.tags.map(t => `<span class="tag">#${t}</span>`).join("")}</div>
    <div class="modal-section">
      <h3>분위기</h3>
      <p>${cafe.desc}</p>
    </div>
    <div class="modal-section">
      <h3>📸 포토 팁</h3>
      <p>${cafe.tip}</p>
    </div>
    <div class="modal-section">
      <h3>⏰ 추천 방문 시간</h3>
      <p>${cafe.bestTime}</p>
    </div>
  `;
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }
document.getElementById("overlay").addEventListener("click", e => {
  if(e.target.id === "overlay") closeModal();
});

document.getElementById("search").addEventListener("input", e => {
  state.q = e.target.value;
  renderGrid();
});

renderChips("areaChips", AREA_GROUPS, "area");
renderChips("typeChips", TYPES, "type");
renderGrid();
</script>
</body>
</html>
